# H2 in-memory profile for frontend developers who don't have PostgreSQL installed.
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=h2
# Self-contained on purpose: works even when src/main/resources/application.properties
# (the PostgreSQL dev config, gitignored) does not exist on disk yet.

spring.datasource.url=jdbc:h2:mem:vet_clinic_h2;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=h2-profile-only-jwt-secret-not-for-production-use
app.jwt.expiration-ms=86400000

app.seed.admin.email=admin@clinic.com
app.seed.admin.password=Admin123!
app.seed.vet1.email=vet1@clinic.com
app.seed.vet1.password=Vet12345!
app.seed.vet2.email=vet2@clinic.com
app.seed.vet2.password=Vet22345!
app.seed.receptionist.email=receptionist@clinic.com
app.seed.receptionist.password=Reception123!
