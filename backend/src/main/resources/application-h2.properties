# H2 in-memory profile for frontend developers who don't have PostgreSQL installed.
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=h2
# Self-contained on purpose: works even when src/main/resources/application.properties
# (the PostgreSQL dev config, gitignored) does not exist on disk yet.

spring.datasource.url=jdbc:h2:mem:vet_clinic_h2;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=h2-profile-only-jwt-secret-not-for-production-use
app.jwt.expiration-ms=86400000

app.seed.admin.email=h2-admin@example.com
app.seed.admin.password=H2Demo-Admin-2026!
app.seed.vet1.email=h2-vet1@example.com
app.seed.vet1.password=H2Demo-Vet1-2026!
app.seed.vet2.email=h2-vet2@example.com
app.seed.vet2.password=H2Demo-Vet2-2026!
app.seed.receptionist.email=h2-receptionist@example.com
app.seed.receptionist.password=H2Demo-Reception-2026!

app.seed.demo-data.enabled=true
